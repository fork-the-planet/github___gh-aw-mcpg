  agent:
    needs:
      - activation
      - create-tag
      - docker
      - generate-sbom
      - release
      - test
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: read
      pull-requests: read
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
